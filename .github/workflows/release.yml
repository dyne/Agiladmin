name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        run: echo "AGILADMIN_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gitlibs
            ~/.m2/repository
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Run tests
        run: make test CLOJURE=clojure

      - name: Build uberjar
        run: make build CLOJURE=clojure AGILADMIN_VERSION="$AGILADMIN_VERSION"

      - name: Generate checksums
        run: sha256sum "target/${AGILADMIN_VERSION}-standalone.jar" > "target/${AGILADMIN_VERSION}-standalone.jar.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            target/${{ env.AGILADMIN_VERSION }}-standalone.jar
            target/${{ env.AGILADMIN_VERSION }}-standalone.jar.sha256
          generate_release_notes: true
